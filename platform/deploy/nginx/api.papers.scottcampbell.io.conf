# /etc/nginx/sites-available/api.papers.scottcampbell.io
#
# Production reverse-proxy for the arXiv recommender FastAPI service on the VPS.
# Uvicorn listens on 127.0.0.1:8820; nginx terminates TLS and forwards requests.
# CORS is handled inside FastAPI (ARXREC_CORS_ORIGINS, set to
# https://papers.scottcampbell.io in the production .env).
#
# This mirrors the live config. The TLS lines below (cert paths, the included
# options-ssl-nginx.conf and ssl-dhparams.pem, and the 80->443 redirect) are
# managed by Certbot. On a fresh box, install an HTTP-only server block first,
# then run:
#   sudo certbot --nginx -d api.papers.scottcampbell.io
# which injects exactly these directives and writes the referenced files.

upstream arxrec_api {
    server 127.0.0.1:8820;
    keepalive 32;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.papers.scottcampbell.io;
    return 301 https://$host$request_uri;
}

# HTTPS content
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.papers.scottcampbell.io;

    ssl_certificate     /etc/letsencrypt/live/api.papers.scottcampbell.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.papers.scottcampbell.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/arxrec-api.access.log;
    error_log  /var/log/nginx/arxrec-api.error.log warn;

    client_max_body_size 64k;

    location = /healthz {
        proxy_pass http://arxrec_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location / {
        proxy_pass http://arxrec_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
