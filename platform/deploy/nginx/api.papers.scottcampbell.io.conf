# /etc/nginx/sites-available/api.papers.scottcampbell.io
#
# Reverse-proxy for the arXiv recommender FastAPI service on the VPS.
# Uvicorn listens on 127.0.0.1:8820; nginx terminates TLS and forwards
# requests. CORS is handled inside FastAPI (BOOKREC_CORS_ORIGINS, set to
# https://papers.scottcampbell.io in the production .env).
#
# TLS provisioning, run once:
#   sudo certbot --nginx -d api.papers.scottcampbell.io

upstream arxrec_api {
    server 127.0.0.1:8820;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.papers.scottcampbell.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.papers.scottcampbell.io;

    # ssl_certificate     /etc/letsencrypt/live/api.papers.scottcampbell.io/fullchain.pem;  # managed by Certbot
    # ssl_certificate_key /etc/letsencrypt/live/api.papers.scottcampbell.io/privkey.pem;    # managed by Certbot

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/arxrec-api.access.log;
    error_log  /var/log/nginx/arxrec-api.error.log warn;

    client_max_body_size 64k;

    location = /healthz {
        proxy_pass http://arxrec_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location / {
        proxy_pass http://arxrec_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
