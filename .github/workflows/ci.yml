name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  platform:
    name: platform (backend)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Lint with ruff
        run: ruff check arxrec tests
      - name: Pytest (unit + property tests, skip integration)
        run: pytest -q -m "not integration"

  frontend:
    name: frontend (Next.js build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: https://api.papers.scottcampbell.io
